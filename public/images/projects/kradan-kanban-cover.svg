<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <!-- Background -->
  <rect width="800" height="450" fill="#121420" />
  
  <!-- Subtle Grid Pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1" />
    </pattern>
    <linearGradient id="blue-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Abstract Design Shapes (Kanban Simulation Layout) -->
  <g opacity="0.3" transform="translate(480, 100)">
    <!-- Kanban Columns -->
    <rect x="0" y="0" width="80" height="220" rx="6" fill="none" stroke="#3b82f6" stroke-width="2" />
    <rect x="90" y="0" width="80" height="220" rx="6" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4 4" />
    <rect x="180" y="0" width="80" height="220" rx="6" fill="none" stroke="#3b82f6" stroke-width="2" />
    <!-- Task Cards -->
    <rect x="8" y="15" width="64" height="40" rx="4" fill="url(#blue-purple)" opacity="0.4" />
    <rect x="8" y="65" width="64" height="30" rx="4" fill="#f8fafc" opacity="0.1" />
    <rect x="98" y="15" width="64" height="50" rx="4" fill="#f8fafc" opacity="0.15" />
    <rect x="188" y="15" width="64" height="35" rx="4" fill="url(#blue-purple)" opacity="0.4" />
  </g>
  
  <!-- Text Content -->
  <rect x="50" y="80" width="80" height="30" rx="6" fill="#3b82f6" fill-opacity="0.1" stroke="#3b82f6" stroke-width="1" />
  <text x="90" y="100" font-family="'Outfit', sans-serif" font-size="12" font-weight="600" fill="#3b82f6" text-anchor="middle">JAVA BACKEND</text>
  
  <text x="50" y="170" font-family="'Outfit', sans-serif" font-size="44" font-weight="800" fill="#f8fafc">Kradan Kanban</text>
  <text x="50" y="210" font-family="'Inter', sans-serif" font-size="16" fill="#94a3b8">Team Collaboration Task Board</text>
  
  <text x="50" y="280" font-family="'Fira Code', monospace" font-size="14" fill="#3b82f6">Java 17 • Spring Boot • Spring Security • MySQL</text>
  
  <!-- Conceptual Visual Tag -->
  <rect x="50" y="360" width="160" height="26" rx="4" fill="rgba(0, 0, 0, 0.4)" stroke="rgba(255, 255, 255, 0.1)" stroke-width="1" />
  <text x="130" y="377" font-family="'Inter', sans-serif" font-size="10" fill="#64748b" text-anchor="middle">CONCEPTUAL VISUAL</text>
</svg>

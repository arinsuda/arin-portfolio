<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="100%" height="100%">
    <!-- Background Gradient -->
      <defs>
        <linearGradient id="grad-remov-1" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#0d0d1b" />
          <stop offset="100%" stop-color="#020617" />
        </linearGradient>
      </defs>
      <rect width="1600" height="900" fill="url(#grad-remov-1)" />
      
      <!-- Grid / UI wireframe shapes -->
      <g stroke="#ffffff" stroke-width="1" opacity="0.05">
        <line x1="0" y1="150" x2="1600" y2="150" />
        <line x1="0" y1="750" x2="1600" y2="750" />
        <line x1="300" y1="0" x2="300" y2="900" />
        <line x1="1300" y1="0" x2="1300" y2="900" />
      </g>
      
      <!-- Abstract Layout Drawing -->
      <rect x="350" y="200" width="900" height="500" rx="16" fill="none" stroke="#818cf8" stroke-width="4" opacity="0.3" />
      <rect x="400" y="250" width="240" height="400" rx="8" fill="#818cf8" opacity="0.08" />
      <rect x="680" y="250" width="520" height="180" rx="8" fill="#818cf8" opacity="0.05" />
      <rect x="680" y="470" width="520" height="180" rx="8" fill="#818cf8" opacity="0.05" />
      
      <!-- Project initials / Monogram -->
      <circle cx="200" cy="250" r="70" fill="#818cf8" opacity="0.1" />
      <text x="200" y="255" font-family="'Inter', sans-serif" font-size="48" font-weight="800" fill="#818cf8" text-anchor="middle" dominant-baseline="middle">RM</text>
      
      <!-- Labels -->
      <text x="350" y="100" font-family="'Inter', sans-serif" font-size="38" font-weight="700" fill="#ffffff">REMOV Project Detail</text>
      <text x="350" y="780" font-family="'Inter', sans-serif" font-size="28" font-weight="600" fill="#818cf8">Screenshot Placeholder 1</text>
      <text x="350" y="820" font-family="'Inter', sans-serif" font-size="20" font-weight="400" fill="#94a3b8">Technologies: Vue 3, Go Fiber, PostgreSQL | 1600 x 900 px (16:9)</text>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <!-- Background -->
  <rect width="800" height="450" fill="#121420" />
  
  <!-- Subtle Grid Pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1" />
    </pattern>
    <linearGradient id="cyan-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Abstract Design Shapes -->
  <circle cx="600" cy="225" r="100" fill="none" stroke="url(#cyan-purple)" stroke-width="4" opacity="0.3" />
  <path d="M 540 225 C 540 180, 660 180, 660 225 C 660 270, 540 270, 540 225 Z" fill="none" stroke="url(#cyan-purple)" stroke-width="2" stroke-dasharray="6 6" opacity="0.4" />
  <rect x="580" y="205" width="40" height="40" rx="8" fill="url(#cyan-purple)" opacity="0.2" />
  
  <!-- Text Content -->
  <rect x="50" y="80" width="80" height="30" rx="6" fill="#06b6d4" fill-opacity="0.1" stroke="#06b6d4" stroke-width="1" />
  <text x="90" y="100" font-family="'Outfit', sans-serif" font-size="12" font-weight="600" fill="#06b6d4" text-anchor="middle">VUE CLIENT</text>
  
  <text x="50" y="170" font-family="'Outfit', sans-serif" font-size="44" font-weight="800" fill="#f8fafc">LANDEKLEN</text>
  <text x="50" y="210" font-family="'Inter', sans-serif" font-size="16" fill="#94a3b8">Virtual Pet Browser Game</text>
  
  <text x="50" y="280" font-family="'Fira Code', monospace" font-size="14" fill="#06b6d4">Vue 3 • JavaScript • LocalStorage • Audio Context</text>
  
  <!-- Conceptual Visual Tag -->
  <rect x="50" y="360" width="160" height="26" rx="4" fill="rgba(0, 0, 0, 0.4)" stroke="rgba(255, 255, 255, 0.1)" stroke-width="1" />
  <text x="130" y="377" font-family="'Inter', sans-serif" font-size="10" fill="#64748b" text-anchor="middle">CONCEPTUAL VISUAL</text>
</svg>

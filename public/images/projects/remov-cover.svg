<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <!-- Background -->
  <rect width="800" height="450" fill="#121420" />
  
  <!-- Subtle Grid Pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1" />
    </pattern>
    <linearGradient id="purple-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#grid)" />
  
  <!-- Abstract Design Shapes -->
  <rect x="520" y="100" width="180" height="250" rx="16" fill="none" stroke="url(#purple-cyan)" stroke-width="4" opacity="0.3" transform="rotate(15 610 225)" />
  <rect x="520" y="100" width="180" height="250" rx="16" fill="none" stroke="url(#purple-cyan)" stroke-width="2" stroke-dasharray="8 4" opacity="0.4" transform="rotate(-5 610 225)" />
  <circle cx="610" cy="225" r="50" fill="url(#purple-cyan)" opacity="0.1" />
  
  <!-- Text Content -->
  <rect x="50" y="80" width="90" height="30" rx="6" fill="#a855f7" fill-opacity="0.1" stroke="#a855f7" stroke-width="1" />
  <text x="95" y="100" font-family="'Outfit', sans-serif" font-size="12" font-weight="600" fill="#a855f7" text-anchor="middle">FULL STACK</text>
  
  <text x="50" y="170" font-family="'Outfit', sans-serif" font-size="44" font-weight="800" fill="#f8fafc">REMOV</text>
  <text x="50" y="210" font-family="'Inter', sans-serif" font-size="16" fill="#94a3b8">Movie &amp; TV Social Review Discovery</text>
  
  <text x="50" y="280" font-family="'Fira Code', monospace" font-size="14" fill="#a855f7">Vue 3 • Go Fiber • PostgreSQL • MinIO</text>
  
  <!-- Conceptual Visual Tag -->
  <rect x="50" y="360" width="160" height="26" rx="4" fill="rgba(0, 0, 0, 0.4)" stroke="rgba(255, 255, 255, 0.1)" stroke-width="1" />
  <text x="130" y="377" font-family="'Inter', sans-serif" font-size="10" fill="#64748b" text-anchor="middle">CONCEPTUAL VISUAL</text>
</svg>
